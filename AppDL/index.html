<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheda Alimentare – Mattia Nicolini</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- iOS "Aggiungi a Home" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La mia Dieta">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page-diet" class="page active">
<header>
  <h1>🥗 Scheda Alimentare</h1>
  <p>Mattia Nicolini &nbsp;·&nbsp; 28/05/2026 – 22/07/2026 &nbsp;·&nbsp; 8 settimane</p>
</header>
<nav>
  <a href="#colazione">☀️ Colazione</a>
  <a href="#spuntino">🍎 Spuntino</a>
  <a href="#pranzo">🍝 Pranzo</a>
  <a href="#merenda">⚡ Merenda</a>
  <a href="#cena">🌙 Cena</a>
</nav>
<main><div id="app"></div></main>
</div>

<div id="page-recipes" class="page">
<header>
  <h1>🍽️ Le mie Ricette</h1>
  <p>Crea ricette con gli ingredienti della tua dieta</p>
</header>
<main class="recipes-main">
  <button class="btn-new-recipe" onclick="openRecipeModal()">
    <span style="font-size:1.3rem;line-height:1;font-weight:300">+</span> Nuova ricetta
  </button>
  <div id="recipes-list"></div>
</main>
</div>

<div id="page-days" class="page">
<header>
  <h1>📅 Le mie Giornate</h1>
  <p>Pianifica le tue giornate tipo</p>
</header>
<main class="days-main">
  <button class="btn-new-recipe" onclick="openDayEditor()">
    <span style="font-size:1.3rem;line-height:1;font-weight:300">+</span> Nuova giornata
  </button>
  <div id="days-list"></div>
</main>
</div>

<!-- Modal full-screen: editor giornata -->
<div id="day-modal" class="modal-fullscreen">
  <div class="mf-header">
    <button class="mf-close" onclick="closeDayEditor()">✕</button>
    <span class="mf-title" id="day-modal-title">Nuova giornata</span>
    <button class="mf-save" onclick="saveDay()">Salva</button>
  </div>
  <div class="mf-body" id="day-modal-body"></div>
</div>

<!-- Modal sheet: dettaglio giornata -->
<div id="day-detail-modal" class="modal-overlay" onclick="handleOverlayClick(event,'day-detail-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="day-detail-title"></span>
      <button class="modal-close" onclick="closeModal('day-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="day-detail-body"></div>
    <div class="modal-footer" id="day-detail-footer"></div>
  </div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tab-diet" onclick="switchTab('diet')">
    <span class="tab-icon">📋</span>
    <span>Dieta</span>
  </button>
  <button class="tab-btn" id="tab-recipes" onclick="switchTab('recipes')">
    <span class="tab-icon">🍽️</span>
    <span>Ricette</span>
  </button>
  <button class="tab-btn" id="tab-days" onclick="switchTab('days')">
    <span class="tab-icon">📅</span>
    <span>Giornate</span>
  </button>
</div>

<!-- Modal: crea / modifica ricetta -->
<div id="recipe-modal" class="modal-overlay" onclick="handleOverlayClick(event,'recipe-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nuova ricetta</span>
      <button class="modal-close" onclick="closeModal('recipe-modal')">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveRecipe()">Salva ricetta</button>
    </div>
  </div>
</div>

<!-- Modal: dettaglio ricetta -->
<div id="detail-modal" class="modal-overlay" onclick="handleOverlayClick(event,'detail-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="detail-title"></span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
