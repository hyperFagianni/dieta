<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheda Alimentare – Mattia Nicolini</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a237e">

  <!-- iOS "Aggiungi a Home" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La mia Dieta">
  <style>
    :root {
      --col-colazione: #F57C00;
      --col-spuntino:  #388E3C;
      --col-pranzo:    #1565C0;
      --col-merenda:   #6A1B9A;
      --col-cena:      #B71C1C;
      --bg: #ECEFF1;
      --card: #ffffff;
      --border: #e0e0e0;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #212121;
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(0,0,0,.18);
    }
    header h1 { font-size: 1.7rem; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; opacity: .8; font-size: .9rem; }

    /* ── NAV ── */
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }
    nav a {
      padding: 7px 16px;
      border-radius: 20px;
      text-decoration: none;
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .3px;
      transition: opacity .15s, transform .1s;
    }
    nav a:hover { opacity: .85; transform: translateY(-1px); }

    /* ── MEAL CARD ── */
    .meal-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .meal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      color: #fff;
    }
    .meal-icon { font-size: 2rem; line-height: 1; }
    .meal-title { font-size: 1.25rem; font-weight: 700; }

    /* ── PLATE LABEL ── */
    .plate-label {
      padding: 8px 20px;
      background: #f0f2f5;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #757575;
      border-top: 1px solid var(--border);
    }

    /* ── FOOD ROW ── */
    .food-item { border-top: 1px solid var(--border); }

    .food-row {
      display: flex;
      align-items: center;
      padding: 13px 20px;
      gap: 10px;
    }
    .food-row.clickable { cursor: pointer; transition: background .15s; }
    .food-row.clickable:hover { background: #fafafa; }

    .food-qty {
      display: inline-block;
      background: #eee;
      color: #444;
      font-size: .78rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .food-name { flex: 1; font-size: .95rem; }

    .badge {
      font-size: .7rem;
      font-weight: 700;
      color: #fff;
      padding: 2px 9px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chevron {
      font-size: .75rem;
      color: #bbb;
      flex-shrink: 0;
      transition: transform .2s;
    }
    .food-item.open .chevron { transform: rotate(180deg); }

    /* ── ALTERNATIVES PANEL ── */
    .alt-panel {
      display: none;
      background: #fafafa;
      border-top: 1px dashed #ddd;
      padding: 10px 20px 14px 28px;
    }
    .food-item.open .alt-panel { display: block; }

    .alt-panel h4 {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: #9e9e9e;
      margin-bottom: 8px;
    }
    .alt-list { list-style: none; }
    .alt-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: .88rem;
      color: #424242;
      border-bottom: 1px solid #f0f0f0;
    }
    .alt-list li:last-child { border-bottom: none; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── PER-MEAL COLORS ── */
    .colazione .meal-header { background: linear-gradient(135deg, #FF9800, #E65100); }
    .colazione .badge        { background: #F57C00; }
    .colazione .dot          { background: #F57C00; }
    .colazione .food-qty     { background: #FFF3E0; color: #E65100; }

    .spuntino .meal-header   { background: linear-gradient(135deg, #4CAF50, #1B5E20); }
    .spuntino .badge         { background: #388E3C; }
    .spuntino .dot           { background: #388E3C; }
    .spuntino .food-qty      { background: #E8F5E9; color: #2E7D32; }

    .pranzo .meal-header     { background: linear-gradient(135deg, #2196F3, #0D47A1); }
    .pranzo .badge           { background: #1565C0; }
    .pranzo .dot             { background: #1565C0; }
    .pranzo .food-qty        { background: #E3F2FD; color: #1565C0; }

    .merenda .meal-header    { background: linear-gradient(135deg, #AB47BC, #4A148C); }
    .merenda .badge          { background: #6A1B9A; }
    .merenda .dot            { background: #6A1B9A; }
    .merenda .food-qty       { background: #F3E5F5; color: #6A1B9A; }

    .cena .meal-header       { background: linear-gradient(135deg, #EF5350, #7F0000); }
    .cena .badge             { background: #B71C1C; }
    .cena .dot               { background: #B71C1C; }
    .cena .food-qty          { background: #FFEBEE; color: #B71C1C; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.3rem; }
      .food-row { padding: 11px 14px; gap: 8px; }
      .meal-header { padding: 14px 16px; }
    }
  </style>
</head>

/* ── RENDER ── */
let uid = 0;

function renderApp() {
  document.getElementById('app').innerHTML = DIET.map(renderMeal).join('');
}

function renderMeal(m) {
  const platesHTML = m.plates.map(renderPlate).join('');
  return `
    <article class="meal-card ${m.cls}" id="${m.id}">
      <div class="meal-header">
        <span class="meal-icon">${m.icon}</span>
        <span class="meal-title">${m.meal}</span>
      </div>
      ${platesHTML}
    </article>`;
}

function renderPlate(plate) {
  const foodsHTML = plate.foods.map(renderFood).join('');
  return `
    <div class="plate-label">${plate.name}</div>
    ${foodsHTML}`;
}

function renderFood(food) {
  const id = `f${uid++}`;
  const hasAlts = food.alts.length > 0;

  const altPanel = hasAlts ? `
    <div class="alt-panel">
      <h4>Puoi sostituire con:</h4>
      <ul class="alt-list">
        ${food.alts.map(a => `
          <li>
            <span class="dot"></span>
            <span>${a}</span>
          </li>`).join('')}
      </ul>
    </div>` : '';

  const onClick = hasAlts ? `onclick="toggle('${id}')"` : '';
  const badge   = hasAlts ? `<span class="badge">${food.alts.length} alt.</span>` : '';
  const chevron = hasAlts ? `<span class="chevron">▼</span>` : '';

  return `
    <div class="food-item" id="${id}">
      <div class="food-row ${hasAlts ? 'clickable' : ''}" ${onClick}>
        <span class="food-qty">${food.qty}</span>
        <span class="food-name">${food.item}</span>
        ${badge}${chevron}
      </div>
      ${altPanel}
    </div>`;
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

renderApp();

/* ── iOS: genera apple-touch-icon via canvas ── */
(function generateAppleIcon() {
  const SIZE = 180;
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const s = SIZE;

  // Sfondo gradiente
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1a237e');
  grad.addColorStop(1, '#3949ab');
  ctx.fillStyle = grad;
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0); ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r); ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath(); ctx.fill();

  // Piatto
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.56, s * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // Insalata
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(s*.48, s*.55, s*.145, s*.1, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#66BB6A';
  ctx.beginPath(); ctx.ellipse(s*.54, s*.52, s*.12, s*.088, 0.3, 0, Math.PI*2); ctx.fill();

  // Pomodoro
  ctx.fillStyle = '#EF5350';
  ctx.beginPath(); ctx.arc(s*.58, s*.57, s*.052, 0, Math.PI*2); ctx.fill();

  // Carota
  ctx.fillStyle = '#FF9800';
  ctx.beginPath(); ctx.ellipse(s*.43, s*.6, s*.055, s*.035, 0.5, 0, Math.PI*2); ctx.fill();

  // Forchetta
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.roundRect(s*.22, s*.24, s*.038, s*.3, s*.019); ctx.fill();
  [s*.196, s*.222, s*.248].forEach(x => {
    ctx.beginPath(); ctx.roundRect(x, s*.24, s*.022, s*.14, s*.011); ctx.fill();
  });

  // Coltello
  ctx.beginPath(); ctx.roundRect(s*.74, s*.24, s*.036, s*.3, s*.018); ctx.fill();

  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = canvas.toDataURL('image/png');
  document.head.appendChild(link);
}());
