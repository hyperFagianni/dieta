<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- iOS "Aggiungi a Home" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La mia Dieta">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-2: #1e293b;
      --navy-3: #334155;
      --accent: #1d4ed8;
      --accent-light: #eff6ff;
      --accent-mid:   #bfdbfe;
      --bg:     #f8fafc;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #0f172a;
      --text-muted: #64748b;
      --radius-lg: 18px;
      --radius:    12px;
      --radius-sm: 7px;
      --shadow:      0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.05);
      --shadow-hover: 0 2px 6px rgba(0,0,0,.06), 0 10px 24px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 44px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(29,78,216,.35) 0%, transparent 70%);
      pointer-events: none;
    }
    header h1 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -.5px;
      position: relative;
    }
    header p {
      margin-top: 8px;
      opacity: .5;
      font-size: .8rem;
      font-weight: 400;
      letter-spacing: .3px;
      position: relative;
    }

    /* ── STICKY NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(248,250,252,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    nav::-webkit-scrollbar { display: none; }
    nav a {
      padding: 8px 18px;
      border-radius: 50px;
      text-decoration: none;
      color: #fff;
      background: var(--navy-2) !important;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .2px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .2s, transform .15s;
    }
    nav a:hover  { background: var(--navy-3) !important; transform: translateY(-1px); }
    nav a:active { transform: translateY(0); }

    /* ── MAIN WRAPPER ── */
    main {
      padding: 24px 16px 48px;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── MEAL CARD ── */
    .meal-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: box-shadow .25s ease, transform .2s ease;
    }
    .meal-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    .meal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      color: #fff;
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }
    .meal-header::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.03));
      pointer-events: none;
    }
    .meal-icon {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.25));
    }
    .meal-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    /* ── PLATE LABEL ── */
    .plate-label {
      padding: 9px 22px;
      background: #f8fafc;
      font-size: .67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── FOOD ROW ── */
    .food-item { border-top: 1px solid var(--border); }

    .food-row {
      display: flex;
      align-items: center;
      padding: 14px 22px;
      gap: 12px;
    }
    .food-row.clickable { cursor: pointer; transition: background .15s; }
    .food-row.clickable:hover  { background: #f8fafc; }
    .food-row.clickable:active { background: #f1f5f9; }

    .food-qty {
      display: inline-flex;
      align-items: center;
      font-size: .7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: .1px;
      background: var(--accent-light);
      color: var(--accent);
    }
    .food-name {
      flex: 1;
      font-size: .88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
    }

    .badge {
      font-size: .64rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent-mid);
      padding: 3px 10px;
      border-radius: 50px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: .2px;
    }
    .chevron {
      font-size: .68rem;
      color: #cbd5e1;
      flex-shrink: 0;
      transition: transform .25s cubic-bezier(.4,0,.2,1), color .2s;
    }
    .food-item.open .chevron { transform: rotate(180deg); color: #94a3b8; }

    /* ── ALT PANEL ── */
    .alt-panel {
      display: none;
      background: #f8fafc;
      border-top: 1px dashed #e2e8f0;
      padding: 12px 22px 16px 36px;
    }
    .food-item.open .alt-panel { display: block; }

    .alt-panel h4 {
      font-size: .64rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .alt-list { list-style: none; }
    .alt-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: .82rem;
      color: #374151;
      font-weight: 400;
      border-bottom: 1px solid #f1f5f9;
    }
    .alt-list li:last-child { border-bottom: none; }
    /* ── DOT ── */
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
      opacity: .6;
    }

    @media (max-width: 480px) {
      header { padding: 32px 18px 24px; }
      header h1 { font-size: 1.25rem; }
      .food-row { padding: 12px 16px; gap: 10px; }
      .meal-header { padding: 16px 18px; }
      .plate-label { padding: 8px 16px; }
      .alt-panel { padding: 10px 16px 14px 26px; }
      main { padding: 18px 12px 36px; }
    }
  </style>
</head>

/* ── RENDER ── */
let uid = 0;

function renderApp() {
  document.getElementById('app').innerHTML = DIET.map(renderMeal).join('');
}

function renderMeal(m) {
  const platesHTML = m.plates.map(renderPlate).join('');
  return `
    <article class="meal-card ${m.cls}" id="${m.id}">
      <div class="meal-header">
        <span class="meal-icon">${m.icon}</span>
        <span class="meal-title">${m.meal}</span>
      </div>
      ${platesHTML}
    </article>`;
}

function renderPlate(plate) {
  const foodsHTML = plate.foods.map(renderFood).join('');
  return `
    <div class="plate-label">${plate.name}</div>
    ${foodsHTML}`;
}

function renderFood(food) {
  const id = `f${uid++}`;
  const hasAlts = food.alts.length > 0;

  const altPanel = hasAlts ? `
    <div class="alt-panel">
      <h4>Puoi sostituire con:</h4>
      <ul class="alt-list">
        ${food.alts.map(a => `
          <li>
            <span class="dot"></span>
            <span>${a}</span>
          </li>`).join('')}
      </ul>
    </div>` : '';

  const onClick = hasAlts ? `onclick="toggle('${id}')"` : '';
  const badge   = hasAlts ? `<span class="badge">${food.alts.length} alt.</span>` : '';
  const chevron = hasAlts ? `<span class="chevron">▼</span>` : '';

  return `
    <div class="food-item" id="${id}">
      <div class="food-row ${hasAlts ? 'clickable' : ''}" ${onClick}>
        <span class="food-qty">${food.qty}</span>
        <span class="food-name">${food.item}</span>
        ${badge}${chevron}
      </div>
      ${altPanel}
    </div>`;
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

renderApp();

/* ── iOS: genera apple-touch-icon via canvas ── */
(function generateAppleIcon() {
  const SIZE = 180;
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const s = SIZE;

  // Sfondo gradiente
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1a237e');
  grad.addColorStop(1, '#3949ab');
  ctx.fillStyle = grad;
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0); ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r); ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath(); ctx.fill();

  // Piatto
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.56, s * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // Insalata
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(s*.48, s*.55, s*.145, s*.1, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#66BB6A';
  ctx.beginPath(); ctx.ellipse(s*.54, s*.52, s*.12, s*.088, 0.3, 0, Math.PI*2); ctx.fill();

  // Pomodoro
  ctx.fillStyle = '#EF5350';
  ctx.beginPath(); ctx.arc(s*.58, s*.57, s*.052, 0, Math.PI*2); ctx.fill();

  // Carota
  ctx.fillStyle = '#FF9800';
  ctx.beginPath(); ctx.ellipse(s*.43, s*.6, s*.055, s*.035, 0.5, 0, Math.PI*2); ctx.fill();

  // Forchetta
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.roundRect(s*.22, s*.24, s*.038, s*.3, s*.019); ctx.fill();
  [s*.196, s*.222, s*.248].forEach(x => {
    ctx.beginPath(); ctx.roundRect(x, s*.24, s*.022, s*.14, s*.011); ctx.fill();
  });

  // Coltello
  ctx.beginPath(); ctx.roundRect(s*.74, s*.24, s*.036, s*.3, s*.018); ctx.fill();

  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = canvas.toDataURL('image/png');
  document.head.appendChild(link);
}());
